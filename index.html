<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kompleksowy Generator Bilansu + Księga Główna</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f1f4f8; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        .section { margin-bottom: 30px; padding: 20px; background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 5px; }
        .input-group { margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;}
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        input[type="text"] { min-width: 150px; }
        select { min-width: 450px; }
        button { padding: 8px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        button:hover { background-color: #2980b9; }
        
        .delete-btn { background-color: #e74c3c; padding: 4px 8px; margin-left: 10px; font-size: 0.8em; }
        .delete-btn:hover { background-color: #c0392b; }
        .edit-btn { background-color: #f39c12; padding: 4px 8px; margin-left: 5px; font-size: 0.8em; }
        .edit-btn:hover { background-color: #d68910; }
        
        .action-btn { background-color: #27ae60; font-size: 1.1em; width: 100%; margin-top: 10px; padding: 12px; }
        .action-btn:hover { background-color: #219653; }
        .action-btn-purple { background-color: #8e44ad; font-size: 1.1em; width: 100%; margin-top: 10px; padding: 12px; }
        .action-btn-purple:hover { background-color: #732d91; }
        .close-btn { background-color: #f39c12; width: 100%; margin-top: 15px; }
        
        /* Konta T-owe */
        #t-accounts-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; justify-content: center; }
        .t-account { width: 320px; border: 1px solid #bdc3c7; background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column;}
        .t-header { text-align: center; font-weight: bold; font-size: 0.95em; border-bottom: 3px solid #2c3e50; padding: 8px; background: #ecf0f1; }
        .t-body { display: flex; flex-grow: 1; }
        .t-side { width: 50%; padding: 5px; box-sizing: border-box; display: flex; flex-direction: column;}
        .t-wn { border-right: 3px solid #2c3e50; }
        .t-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; margin-bottom: 4px; padding-bottom: 2px;}
        .op-actions { display: flex; gap: 3px; }
        .op-btn { background: none; border: none; cursor: pointer; padding: 0 3px; font-size: 1em; color: #7f8c8d; }
        .op-btn:hover { color: #e74c3c; transform: scale(1.1); }
        
        .t-input-row { display: flex; flex-direction: column; gap: 5px; margin-top: auto; padding-top: 10px;}
        .t-input-row input { width: 100%; box-sizing: border-box; padding: 4px; font-size: 0.85em; }
        
        /* Styl zamykania kont */
        .t-footer { width: 100%; display: flex; flex-direction: column; font-size: 0.85em;}
        .t-closure-obroty { display: flex; border-top: 1px solid #000; padding-top: 2px; }
        .t-closure-sk { display: flex; padding-bottom: 2px; }
        .t-closure-final { display: flex; border-top: 1px solid #000; border-bottom: 4px double #000; font-weight: bold; margin-bottom: 8px; padding: 2px 0; }
        .col-half { width: 50%; padding: 0 5px; box-sizing: border-box; }
        .border-mid { border-right: 3px solid #2c3e50; }
        
        /* Tabele Ogólne (Zestawienie Obrotów i Sald + Dziennik) */
        .generic-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; background: #fff; }
        .generic-table th, .generic-table td { border: 1px solid #7f8c8d; padding: 6px; text-align: left; vertical-align: middle; }
        .generic-table th { background-color: #bdc3c7; text-align: center; font-size: 1em; }
        
        /* Tabele Bilansu - Symetryczne i zawijające tekst */
        .balance-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; background: #fff; table-layout: fixed; }
        .balance-table th, .balance-table td { border: 1px solid #7f8c8d; padding: 6px; text-align: left; vertical-align: top; word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }
        .balance-table th { background-color: #bdc3c7; text-align: center; font-size: 1em; }

        .section-header { font-weight: bold; background-color: #ecf0f1; }
        .main-total { font-weight: bold; font-size: 1.1em; background-color: #95a5a6; color: white; }
        .val { text-align: right; }
        
        .report-header { text-align: center; margin-top: 30px; margin-bottom: 20px; }
        .report-header h3 { border: none; margin: 5px 0; padding: 0; }
        .report-header h4 { margin: 5px 0; color: #7f8c8d; font-weight: normal; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Księga Główna i Sprawozdania Finansowe</h2>
        
        <!-- SEKCJA 0: DANE JEDNOSTKI -->
        <div class="section">
            <h3>Dane Jednostki</h3>
            <div class="input-group">
                <input type="text" id="entity_name" placeholder="Nazwa jednostki (np. ABC Sp. z o.o.)" style="width: 350px;">
                <label>Data sporządzenia: <input type="date" id="report_date"></label>
            </div>
        </div>

        <!-- SEKCJA 1: KONTA T-OWE -->
        <div class="section">
            <h3>1. Księga Główna (Konta T-owe - wizualne)</h3>
            <div class="input-group">
                <label>Wybierz konto: </label>
                <input type="text" id="account_search" placeholder="Szukaj (np. Kasa, 130)..." py-input="filter_accounts" style="width: 200px;">
                <select id="t_account_select" style="min-width: 400px; max-width: 500px;"></select>
                <button py-click="add_t_account">Utwórz konto T-owe</button>
            </div>
            
            <div id="t-accounts-container"></div>
            
            <button class="close-btn" id="toggle-btn" py-click="toggle_t_accounts">ZAMKNIJ KONTA T-OWE (Pociągnij salda)</button>
        </div>

        <!-- SEKCJA 2: DEKRETACJA OPERACJI GOSPODARCZYCH -->
        <div class="section">
            <h3>2. Dekretacja operacji gospodarczych (Dziennik)</h3>
            <div class="input-group">
                <input type="text" id="j_op" placeholder="Nr op. (np. 1a)" style="width: 100px;">
                <input type="text" id="j_amt" placeholder="Kwota (np. 1500,50)" style="width: 150px;">
            </div>
            <div class="input-group">
                <label style="min-width: 100px;">Wn (Dt): </label>
                <input type="text" id="j_search_wn" placeholder="Szukaj konta..." py-input="filter_j_wn" style="width: 150px;">
                <select id="j_acc_wn" style="min-width: 350px;"></select>
            </div>
            <div class="input-group">
                <label style="min-width: 100px;">Ma (Ct): </label>
                <input type="text" id="j_search_ma" placeholder="Szukaj konta..." py-input="filter_j_ma" style="width: 150px;">
                <select id="j_acc_ma" style="min-width: 350px;"></select>
            </div>
            <div class="input-group">
                <button py-click="add_journal" style="background-color: #8e44ad; width: 250px;">Dodaj zapis (Dekretuj)</button>
            </div>
            
            <table class="generic-table" style="margin-top: 15px;">
                <thead>
                    <tr>
                        <th rowspan="2" style="width: 8%;">Nr op.</th>
                        <th rowspan="2" style="width: 15%;">Kwota</th>
                        <th colspan="2">Konto (symbol, nazwa)</th>
                        <th rowspan="2" style="width: 12%;">Akcje</th>
                    </tr>
                    <tr>
                        <th style="width: 32.5%;">Wn (Dt)</th>
                        <th style="width: 32.5%;">Ma (Ct)</th>
                    </tr>
                </thead>
                <tbody id="journal-tbody">
                </tbody>
            </table>
        </div>

        <!-- SEKCJA 3: RĘCZNE WPROWADZANIE DO BILANSU -->
        <div class="section">
            <h3>3. Bezpośrednie wprowadzanie do bilansu (Opcjonalnie)</h3>
            <div class="input-group">
                <input type="text" id="item_number" placeholder="Nr (np. 1)" style="width: 80px;">
                <input type="text" id="amount" placeholder="Kwota (np. 1 000 000,50)">
                <select id="category">

                    <option disabled style="font-weight:bold; background:#eee; color:#000;">AKTYWA</option>
                    <option disabled style="font-weight:bold; color:#333;">A. Aktywa trwałe</option>
                    <option value="ak_a_i">A.I. Wartości niematerialne i prawne</option>

                    <option value="ak_b_iv">B.IV. Krótkoterminowe rozliczenia międzyokresowe</option>
                    
                    <option value="ak_c" style="font-weight:bold; color:#333;">C. Należne wpłaty na kapitał (fundusz) podstawowy</option>
                    <option value="ak_d" style="font-weight:bold; color:#333;">D. Udziały (akcje) własne</option>
                    
                    <!-- PASYWA -->
                    <option disabled style="font-weight:bold; background:#eee; color:#000;">PASYWA</option>
                    <option disabled style="font-weight:bold; color:#333;">A. Kapitał (fundusz) własny</option>
                    <option value="pa_a_i">A.I. Kapitał (fundusz) podstawowy</option>
                    <option value="pa_a_ii">A.II. Kapitał (fundusz) zapasowy, w tym:</option>
                    <option value="pa_a_ii_1">&nbsp;&nbsp;A.II.1. - nadwyżka wartości sprzedaży (wartości emisyjnej) nad wartością nominalną udziałów (akcji)</option>
                    <option value="pa_a_iii">A.III. Kapitał (fundusz) z aktualizacji wyceny, w tym:</option>
                    <option value="pa_a_iii_1">&nbsp;&nbsp;A.III.1. - z tytułu aktualizacji wartości godziwej</option>
                    <option value="pa_a_iv">A.IV. Pozostałe kapitały (fundusze) rezerwowe</option>
                    <option value="pa_a_v">A.V. Zysk (strata) z lat ubiegłych</option>
                    <option value="pa_a_vi">A.VI. Zysk (strata) netto</option>
                    <option value="pa_a_vii">A.VII. Odpisy z zysku netto w ciągu roku obrotowego (wielkość ujemna)</option>
                    
                    <option disabled style="font-weight:bold; color:#333;">B. Zobowiązania i rezerwy na zobowiązania</option>
                    <option value="pa_b_i">B.I. Rezerwy na zobowiązania, w tym:</option>
                    <option value="pa_b_i_1">&nbsp;&nbsp;B.I.1. - rezerwa na świadczenia emerytalne i podobne</option>
                    <option value="pa_b_ii">B.II. Zobowiązania długoterminowe, w tym:</option>
                    <option value="pa_b_ii_1">&nbsp;&nbsp;B.II.1. - z tytułu kredytów i pożyczek</option>
                    <option value="pa_b_iii">B.III. Zobowiązania krótkoterminowe, w tym:</option>
                    <option value="pa_b_iii_a">&nbsp;&nbsp;B.III.a) z tytułu kredytów i pożyczek</option>
                    <option value="pa_b_iii_b">&nbsp;&nbsp;B.III.b) z tytułu dostaw i usług, w tym:</option>
                    <option value="pa_b_iii_b_1">&nbsp;&nbsp;&nbsp;&nbsp;B.III.b)1. - do 12 miesięcy</option>
                    <option value="pa_b_iii_b_2">&nbsp;&nbsp;&nbsp;&nbsp;B.III.b)2. - powyżej 12 miesięcy</option>
                    <option value="pa_b_iii_c">&nbsp;&nbsp;B.III.c) fundusze specjalne</option>
                    <option value="pa_b_iv">B.IV. Rozliczenia międzyokresowe</option>
                </select>
                <button py-click="add_manual_item">Dodaj składnik ręcznie</button>
            </div>
            <ul id="items-list" style="list-style-type: none; padding: 0;"></ul>
        </div>

        <button class="action-btn-purple" py-click="generate_trial_balance">GENERUJ ZESTAWIENIE OBROTÓW I SALD</button>
        <button class="action-btn" py-click="generate_balance">GENERUJ ZBIORCZY BILANS</button>
        
        <div id="zestawienie-output"></div>
        <div id="bilans-output"></div>
    </div>

                    has_subaccounts.add(parent_code)
                    
            if select_id in ["j_acc_wn", "j_acc_ma"]:
                html += "<option value=''>-- Brak / Nie dotyczy --</option>"
            
            for code, data in CHART_OF_ACCOUNTS.items():
                display_text = f"{code} {data[0]}"
                if search_term and search_term not in display_text.lower():
                    continue
                group_prefix = code[0]
                group_name = GROUP_NAMES.get(group_prefix, f"Zespół {group_prefix}")
                
                if group_name != current_group:
                    if current_group != "": html += "</optgroup>"
                    html += f"<optgroup label='{group_name}'>"
                    current_group = group_name
                
                disabled = "disabled" if code in has_subaccounts else ""

        def parse_pln(val_str):
            if not val_str: return 0.0
            val_str = str(val_str).replace(" ", "").replace(",", ".")

        def get_aggregated_data():
            agg = {}
            # 1. Pobierz z kont T-owych
            for code, data in t_accounts_store.items():
                if code not in agg: agg[code] = {"wn": [], "ma": []}
                agg[code]["wn"].extend(data["wn"])
                agg[code]["ma"].extend(data["ma"])
                
            # 2. Pobierz z dziennika dekretacji
            for item in journal_store:
                if item["wn_code"]:
                    if item["wn_code"] not in agg: agg[item["wn_code"]] = {"wn": [], "ma": []}
                    agg[item["wn_code"]]["wn"].append({"op": item["no"], "amt": item["amount"]})
                if item["ma_code"]:
                    if item["ma_code"] not in agg: agg[item["ma_code"]] = {"wn": [], "ma": []}
                    agg[item["ma_code"]]["ma"].append({"op": item["no"], "amt": item["amount"]})
                    
            return agg

        def generate_trial_balance(e):
            html = get_report_header("Zestawienie obrotów i sald kont księgi głównej")
            html += """
            <table class="generic-table">
                <tr>
                    <th rowspan="2">Nazwa konta</th>
                    <th colspan="2">Salda na dzień otwarcia ksiąg rachunkowych</th>

                    <th colspan="2">Obroty narastająco od początku roku (z saldem)</th>
                    <th colspan="2">Salda na koniec okresu sprawozdawczego</th>
                </tr>
                <tr>
                    <th>Dt</th><th>Ct</th><th>Dt</th><th>Ct</th><th>Dt</th><th>Ct</th><th>Dt</th><th>Ct</th>
                </tr>
            """
            
            tot_bo_dt = tot_bo_ct = tot_ob_dt = tot_ob_ct = tot_nar_dt = tot_nar_ct = tot_sk_dt = tot_sk_ct = 0
            
            agg_data = get_aggregated_data()

            for code in sorted(agg_data.keys()):
                data = agg_data[code]
                name = f"{code} {CHART_OF_ACCOUNTS[code][0]}"
                
                bo_dt = round(sum(x['amt'] for x in data['wn'] if x['op'].strip().lower() in ['sp', 'bo']), 2)
                bo_ct = round(sum(x['amt'] for x in data['ma'] if x['op'].strip().lower() in ['sp', 'bo']), 2)
                ob_dt = round(sum(x['amt'] for x in data['wn'] if x['op'].strip().lower() not in ['sp', 'bo']), 2)
                ob_ct = round(sum(x['amt'] for x in data['ma'] if x['op'].strip().lower() not in ['sp', 'bo']), 2)
                nar_dt = round(bo_dt + ob_dt, 2)
                nar_ct = round(bo_ct + ob_ct, 2)
                sk_dt = max(0, nar_dt - nar_ct)
                sk_ct = max(0, nar_ct - nar_dt)
                
                tot_bo_dt += bo_dt; tot_bo_ct += bo_ct
                tot_ob_dt += ob_dt; tot_ob_ct += ob_ct
                tot_nar_dt += nar_dt; tot_nar_ct += nar_ct
                tot_sk_dt += sk_dt; tot_sk_ct += sk_ct
                
                html += f"""
                <tr>
                    <td>{name}</td>
                    <td class='val'>{fmt_pln(bo_dt)}</td><td class='val'>{fmt_pln(bo_ct)}</td>
                    <td class='val'>{fmt_pln(ob_dt)}</td><td class='val'>{fmt_pln(ob_ct)}</td>
                    <td class='val'>{fmt_pln(nar_dt)}</td><td class='val'>{fmt_pln(nar_ct)}</td>
                    <td class='val'>{fmt_pln(sk_dt)}</td><td class='val'>{fmt_pln(sk_ct)}</td>
                </tr>
                """
            
            html += f"""

                    <td>SUMA</td>

            """
            js.document.getElementById("zestawienie-output").innerHTML = html
            js.document.getElementById("bilans-output").innerHTML = "" 
            
            if abs(tot_ob_dt - tot_ob_ct) > 0.01:
                js.alert("UWAGA! Obroty za okres Dt i Ct nie są sobie równe. Sprawdź poprawność wprowadzonych dekretacji i księgowań!")

        def generate_balance(e):
            if t_accounts_store and not accounts_closed:
                js.alert("Masz otwarte konta T-owe! Najpierw zamknij konta żółtym przyciskiem w Sekcji 1.")

            sums = {

            }

            net_profit_from_operations = 0
            
            agg_data = get_aggregated_data()

            for item in manual_store:
                if item["cat"] in sums: sums[item["cat"]] += item["amount"]

            for code, data in agg_data.items():
                acc_info = CHART_OF_ACCOUNTS[code]
                sum_wn = sum([x['amt'] for x in data['wn']])
                sum_ma = sum([x['amt'] for x in data['ma']])
                acc_type = acc_info[1]

                if acc_type == 'A':
                    saldo = sum_wn - sum_ma
                    if saldo > 0: sums[acc_info[2]] += saldo
                elif acc_type == 'P':
                    saldo = sum_ma - sum_wn
                    if saldo > 0: sums[acc_info[2]] += saldo
                elif acc_type == 'A_contra':
                    saldo = sum_ma - sum_wn
                    if saldo > 0: sums[acc_info[2]] -= saldo
                elif acc_type == 'AP':
                    if sum_wn > sum_ma: sums[acc_info[2]] += (sum_wn - sum_ma)
                    elif sum_ma > sum_wn: sums[acc_info[3]] += (sum_ma - sum_wn)
                elif acc_type == 'R': 
                    net_profit_from_operations += (sum_ma - sum_wn)
                elif acc_type == 'E': 
                    net_profit_from_operations -= (sum_wn - sum_ma)

            sums["pa_a_vi"] += net_profit_from_operations

            aktywa_a_ii = sums['ak_a_ii'] + sums['ak_a_ii_1'] + sums['ak_a_ii_2']
            aktywa_a_iv = sums['ak_a_iv'] + sums['ak_a_iv_1'] + sums['ak_a_iv_2']

            aktywa_b_iii = sums['ak_b_iii'] + aktywa_b_iii_a

            pasywa_b_ii = sums['pa_b_ii'] + sums['pa_b_ii_1']
            pasywa_b_iii_b = sums['pa_b_iii_b'] + sums['pa_b_iii_b_1'] + sums['pa_b_iii_b_2']
            pasywa_b_iii = sums['pa_b_iii'] + sums['pa_b_iii_a'] + pasywa_b_iii_b + sums['pa_b_iii_c']
            pasywa_b = pasywa_b_i + pasywa_b_ii + pasywa_b_iii + sums['pa_b_iv']

                <tr><td><b>A.I.</b> Wartości niematerialne i prawne</td><td class='val'>{fmt_pln(sums['ak_a_i'])}</td><td><b>A.I.</b> Kapitał (fundusz) podstawowy</td><td class='val'>{fmt_pln(sums['pa_a_i'])}</td></tr>
                <tr><td><b>A.II.</b> Rzeczowe aktywa trwałe, w tym:</td><td class='val'>{fmt_pln(aktywa_a_ii)}</td><td><b>A.II.</b> Kapitał (fundusz) zapasowy, w tym:</td><td class='val'>{fmt_pln(pasywa_a_ii)}</td></tr>
                <tr><td style="padding-left: 20px;"><b>A.II.1.</b> - środki trwałe</td><td class='val'>{fmt_pln(sums['ak_a_ii_1'])}</td><td style="padding-left: 20px;"><b>A.II.1.</b> - nadwyżka wartości sprzedaży (wartości emisyjnej) nad wartością nominalną udziałów (akcji)</td><td class='val'>{fmt_pln(sums['pa_a_ii_1'])}</td></tr>

                <tr><td><b>B.III.</b> Inwestycje krótkoterminowe, w tym:</td><td class='val'>{fmt_pln(aktywa_b_iii)}</td><td style="padding-left: 20px;"><b>B.III.a)</b> z tytułu kredytów i pożyczek</td><td class='val'>{fmt_pln(sums['pa_b_iii_a'])}</td></tr>
