<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Generator Bilansu + Księga Główna (Konta T-owe)</title>
    <!-- Ładowanie środowiska PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f1f4f8; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        .section { margin-bottom: 30px; padding: 20px; background: #fdfdfd; border: 1px solid #e0e0e0; border-radius: 5px; }
        .input-group { margin-bottom: 10px; }
        select, input { padding: 8px; max-width: 100%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .delete-btn { background-color: #e74c3c; padding: 4px 8px; margin-left: 10px; font-size: 0.8em; }
        .delete-btn:hover { background-color: #c0392b; }
        .action-btn { background-color: #27ae60; font-size: 1.1em; width: 100%; margin-top: 10px; padding: 12px; }
        .action-btn:hover { background-color: #219653; }
        .close-btn { background-color: #f39c12; width: 100%; margin-top: 15px; }
        
        /* Konta T-owe - Style */
        #t-accounts-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .t-account { width: 340px; border: 1px solid #bdc3c7; background: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .t-header { text-align: center; font-weight: bold; font-size: 1.1em; border-bottom: 4px solid #2c3e50; padding: 8px; background: #ecf0f1; }
        .t-body { display: flex; }
        .t-side { width: 50%; padding: 5px; box-sizing: border-box; }
        .t-wn { border-right: 4px solid #2c3e50; }
        .t-row { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 2px; border-bottom: 1px dashed #eee; }
        .t-input-row { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .t-input-row input { width: 100%; box-sizing: border-box; padding: 4px; font-size: 0.85em; }
        .t-input-row button { padding: 4px; font-size: 0.85em; }
        .t-sum { font-weight: bold; border-top: 2px solid #95a5a6; padding-top: 5px; margin-top: 5px; display: flex; justify-content: space-between;}
        .t-saldo { font-weight: bold; color: #d35400; border-top: 2px solid #e67e22; border-bottom: 2px double #e67e22; padding: 5px 0; margin-top: 5px; text-align: center; background: #fdf4e3; }
        
        /* Stylizacja tabeli bilansu */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.95em; background: #fff; }
        th, td { border: 1px solid #7f8c8d; padding: 10px; text-align: left; }
        th { background-color: #bdc3c7; text-align: center; font-size: 1.05em; }
        .section-header { font-weight: bold; background-color: #ecf0f1; }
        .main-total { font-weight: bold; font-size: 1.15em; background-color: #95a5a6; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Kompleksowy Generator Bilansu</h2>
        
        <!-- SEKCJA 1: KONTA T-OWE -->
        <div class="section">
            <h3>Księga Główna (Konta T-owe)</h3>
            <div class="input-group">
                <label>Wybierz konto z planu kont: 
                    <select id="t_account_select">
                        <optgroup label="Zespół 0 - Aktywa trwałe">
                            <option value="010">010 Środki trwałe</option>
                            <option value="020">020 Wartości niematerialne i prawne</option>
                            <option value="070">070 Umorzenie środków trwałych</option>
                        </optgroup>
                        <optgroup label="Zespół 1 - Środki pieniężne i rachunki">
                            <option value="100">100 Kasa</option>
                            <option value="130">130 Rachunek bieżący</option>
                            <option value="134">134 Kredyty bankowe</option>
                        </optgroup>
                        <optgroup label="Zespół 2 - Rozrachunki (Aktywno-Pasywne)">
                            <option value="200">200 Rozrachunki z odbiorcami</option>
                            <option value="202">202 Rozrachunki z dostawcami</option>
                            <option value="220">220 Rozrachunki publicznoprawne</option>
                            <option value="230">230 Rozrachunki z tytułu wynagrodzeń</option>
                        </optgroup>
                        <optgroup label="Zespół 3 - Materiały i towary">
                            <option value="310">310 Materiały</option>
                            <option value="330">330 Towary</option>
                        </optgroup>
                        <optgroup label="Zespół 8 - Kapitały">
                            <option value="800">800 Kapitał (fundusz) podstawowy</option>
                            <option value="811">811 Kapitał (fundusz) zapasowy</option>
                            <option value="860">860 Wynik finansowy</option>
                        </optgroup>
                    </select>
                </label>
                <button py-click="add_t_account">Utwórz konto T-owe</button>
            </div>
            
            <div id="t-accounts-container"></div>
            
            <button class="close-btn" py-click="close_t_accounts">ZAMKNIJ KONTA (Przenieś salda do Bilansu)</button>
        </div>

        <!-- SEKCJA 2: BEZPOŚREDNIE WPROWADZANIE DO BILANSU -->
        <div class="section">
            <h3>Bezpośrednie wprowadzanie do bilansu (Ręczne pozycje)</h3>
            <div class="input-group">
                <input type="number" id="amount" step="0.01" placeholder="Kwota (np. 1500.50)">
                <select id="category">
                    <!-- Opcje bilansowe z poprzedniego programu -->
                    <option value="ak_a_i">AKTYWA - A.I. Wartości niematerialne i prawne</option>
                    <option value="ak_a_ii">AKTYWA - A.II. Rzeczowe aktywa trwałe</option>
                    <option value="ak_a_iii">AKTYWA - A.III. Należności długoterminowe</option>
                    <option value="ak_a_iv">AKTYWA - A.IV. Inwestycje długoterminowe</option>
                    <option value="ak_a_v">AKTYWA - A.V. Długoterm. rozliczenia międzyokresowe</option>
                    <option value="ak_b_i">AKTYWA - B.I. Zapasy</option>
                    <option value="ak_b_ii">AKTYWA - B.II. Należności krótkoterminowe</option>
                    <option value="ak_b_iii">AKTYWA - B.III. Inwestycje krótkoterminowe</option>
                    <option value="ak_b_iv">AKTYWA - B.IV. Krótkoterm. rozliczenia międzyokresowe</option>
                    <option value="ak_c">AKTYWA - C. Należne wpłaty na kapitał podstawowy</option>
                    <option value="ak_d">AKTYWA - D. Udziały (akcje) własne</option>
                    <option value="pa_a_i">PASYWA - A.I. Kapitał (fundusz) podstawowy</option>
                    <option value="pa_a_ii">PASYWA - A.II. Kapitał (fundusz) zapasowy</option>
                    <option value="pa_a_iii">PASYWA - A.III. Kapitał (fundusz) z aktualizacji wyceny</option>
                    <option value="pa_a_iv">PASYWA - A.IV. Pozostałe kapitały rezerwowe</option>
                    <option value="pa_a_v">PASYWA - A.V. Zysk (strata) z lat ubiegłych</option>
                    <option value="pa_a_vi">PASYWA - A.VI. Zysk (strata) netto</option>
                    <option value="pa_a_vii">PASYWA - A.VII. Odpisy z zysku netto (wpisz minus!)</option>
                    <option value="pa_b_i">PASYWA - B.I. Rezerwy na zobowiązania</option>
                    <option value="pa_b_ii">PASYWA - B.II. Zobowiązania długoterminowe</option>
                    <option value="pa_b_iii">PASYWA - B.III. Zobowiązania krótkoterminowe</option>
                    <option value="pa_b_iv">PASYWA - B.IV. Rozliczenia międzyokresowe</option>
                </select>
                <button py-click="add_manual_item">Dodaj składnik ręcznie</button>
            </div>
            <ul id="items-list" style="list-style-type: none; padding: 0;"></ul>
        </div>

        <button class="action-btn" py-click="generate_balance">GENERUJ ZBIORCZY BILANS</button>

        <div id="bilans-output"></div>
    </div>

    <script type="py">
        import js

        # --- BAZA WIEDZY O KONTACH (Rodzaj i przypisanie do bilansu) ---
        # Typy: 'A' - Aktywne (Saldo Dt), 'P' - Pasywne (Saldo Ct), 
        # 'AP' - Aktywno-Pasywne (Saldo Dt -> Aktywa, Saldo Ct -> Pasywa)
        # 'A_contra' - Korygujące aktywa (Umorzenie - Saldo Ct pomniejsza Aktywa)
        CHART_OF_ACCOUNTS = {
            "010": {"name": "Środki trwałe", "type": "A", "target": "ak_a_ii"},
            "020": {"name": "Wartości niematerialne i prawne", "type": "A", "target": "ak_a_i"},
            "070": {"name": "Umorzenie środków trwałych", "type": "A_contra", "target": "ak_a_ii"},
            "100": {"name": "Kasa", "type": "A", "target": "ak_b_iii"},
            "130": {"name": "Rachunek bieżący", "type": "A", "target": "ak_b_iii"},
            "134": {"name": "Kredyty bankowe", "type": "P", "target": "pa_b_iii"},
            "200": {"name": "Rozrachunki z odbiorcami", "type": "AP", "target_A": "ak_b_ii", "target_P": "pa_b_iii"},
            "202": {"name": "Rozrachunki z dostawcami", "type": "AP", "target_A": "ak_b_ii", "target_P": "pa_b_iii"},
            "220": {"name": "Rozrachunki publicznoprawne", "type": "AP", "target_A": "ak_b_ii", "target_P": "pa_b_iii"},
            "230": {"name": "Rozrachunki z tyt. wynagrodzeń", "type": "AP", "target_A": "ak_b_ii", "target_P": "pa_b_iii"},
            "310": {"name": "Materiały", "type": "A", "target": "ak_b_i"},
            "330": {"name": "Towary", "type": "A", "target": "ak_b_i"},
            "800": {"name": "Kapitał (fundusz) podstawowy", "type": "P", "target": "pa_a_i"},
            "811": {"name": "Kapitał (fundusz) zapasowy", "type": "P", "target": "pa_a_ii"},
            "860": {"name": "Wynik finansowy", "type": "P", "target": "pa_a_vi"}
        }

        # --- STAN APLIKACJI ---
        manual_store = []
        t_accounts_store = {}
        accounts_closed = False

        # --- FUNKCJE DLA WPISÓW RĘCZNYCH ---
        def delete_manual(index):
            manual_store.pop(index)
            render_manual_list()

        js.window.delete_manual_py = delete_manual

        def render_manual_list():
            ul = js.document.getElementById("items-list")
            ul.innerHTML = ""
            for i, item in enumerate(manual_store):
                li = js.document.createElement("li")
                li.style.borderBottom = "1px solid #ddd"
                li.style.padding = "5px 0"
                cat_name = js.document.getElementById("category").querySelector(f"option[value='{item['cat']}']").innerText
                li.innerHTML = f"<strong>{item['amount']:.2f}</strong> -> {cat_name} "
                btn = js.document.createElement("button")
                btn.className = "delete-btn"
                btn.innerText = "Usuń"
                btn.setAttribute("onclick", f"window.delete_manual_py({i})")
                li.appendChild(btn)
                ul.appendChild(li)

        def add_manual_item(e):
            amt_str = js.document.getElementById("amount").value
            cat = js.document.getElementById("category").value
            if not amt_str: return
            try:
                manual_store.append({"cat": cat, "amount": float(amt_str)})
                render_manual_list()
                js.document.getElementById("amount").value = ""
            except:
                js.alert("Niepoprawna kwota.")

        # --- FUNKCJE DLA KONT T-OWYCH ---
        def add_t_account(e):
            code = js.document.getElementById("t_account_select").value
            if code not in t_accounts_store:
                t_accounts_store[code] = {"wn": [], "ma": []}
                global accounts_closed
                accounts_closed = False
                render_t_accounts()
            else:
                js.alert("Konto już istnieje na planszy!")

        def add_operation(code, side):
            if accounts_closed:
                js.alert("Konta są zamknięte! Wygeneruj bilans lub zresetuj stronę, by zacząć od nowa.")
                return
            op_input = js.document.getElementById(f"op_{side}_{code}").value
            amt_input = js.document.getElementById(f"amt_{side}_{code}").value
            if not amt_input: return
            try:
                amt = float(amt_input)
                op = op_input if op_input else "Sp" # Domyślnie Saldo Początkowe jeśli brak numeru
                t_accounts_store[code][side].append({"op": op, "amt": amt})
                render_t_accounts()
            except:
                js.alert("Niepoprawna kwota w operacji.")

        js.window.add_op_py = add_operation

        def render_t_accounts():
            container = js.document.getElementById("t-accounts-container")
            html = ""
            for code, data in t_accounts_store.items():
                acc_info = CHART_OF_ACCOUNTS[code]
                
                # Renderowanie operacji Wn
                wn_html = "".join([f"<div class='t-row'><span>({x['op']})</span><span>{x['amt']:.2f}</span></div>" for x in data['wn']])
                # Renderowanie operacji Ma
                ma_html = "".join([f"<div class='t-row'><span>{x['amt']:.2f}</span><span>({x['op']})</span></div>" for x in data['ma']])
                
                # Obliczanie sum (obroty) i ewentualnie salda
                sum_wn = sum([x['amt'] for x in data['wn']])
                sum_ma = sum([x['amt'] for x in data['ma']])
                
                saldo_html = ""
                if accounts_closed:
                    if acc_info['type'] == 'A':
                        saldo = sum_wn - sum_ma
                        saldo_html = f"<div class='t-saldo'>Sk (Wn): {saldo:.2f}</div>"
                    elif acc_info['type'] == 'P' or acc_info['type'] == 'A_contra':
                        saldo = sum_ma - sum_wn
                        saldo_html = f"<div class='t-saldo'>Sk (Ma): {saldo:.2f}</div>"
                    elif acc_info['type'] == 'AP':
                        if sum_wn > sum_ma:
                            saldo_html = f"<div class='t-saldo'>Sk (Wn): {(sum_wn - sum_ma):.2f}</div>"
                        elif sum_ma > sum_wn:
                            saldo_html = f"<div class='t-saldo'>Sk (Ma): {(sum_ma - sum_wn):.2f}</div>"
                        else:
                            saldo_html = f"<div class='t-saldo'>Sk: 0.00</div>"

                # Blok HTML konta
                acc_html = f"""
                <div class="t-account">
                    <div class="t-header">{code} {acc_info['name']}</div>
                    <div class="t-body">
                        <div class="t-side t-wn">
                            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">Dt (Wn)</div>
                            {wn_html}
                            <div class="t-sum"><span>Obroty:</span><span>{sum_wn:.2f}</span></div>
                            <div class="t-input-row">
                                <input type="text" id="op_wn_{code}" placeholder="Nr op. (np. Sp, 1)">
                                <input type="number" id="amt_wn_{code}" placeholder="Kwota" step="0.01">
                                <button onclick="window.add_op_py('{code}', 'wn')">Księguj Wn</button>
                            </div>
                        </div>
                        <div class="t-side">
                            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">Ct (Ma)</div>
                            {ma_html}
                            <div class="t-sum"><span>{sum_ma:.2f}</span><span>:Obroty</span></div>
                            <div class="t-input-row">
                                <input type="text" id="op_ma_{code}" placeholder="Nr op. (np. 2, 3)">
                                <input type="number" id="amt_ma_{code}" placeholder="Kwota" step="0.01">
                                <button onclick="window.add_op_py('{code}', 'ma')">Księguj Ma</button>
                            </div>
                        </div>
                    </div>
                    {saldo_html}
                </div>
                """
                html += acc_html
            container.innerHTML = html

        def close_t_accounts(e):
            global accounts_closed
            accounts_closed = True
            render_t_accounts()
            js.alert("Konta zostały pomyślnie zamknięte. Salda końcowe (Sk) zostały wyliczone i są gotowe do ujęcia w Bilansie!")

        # --- GENEROWANIE BILANSU (ZBIORCZE) ---
        def generate_balance(e):
            if t_accounts_store and not accounts_closed:
                js.alert("Masz otwarte konta T-owe! Najpierw kliknij 'ZAMKNIJ KONTA', aby przenieść ich salda do bilansu.")
                return

            # Reset sum dla kategorii bilansowych
            sums = {
                "ak_a_i": 0, "ak_a_ii": 0, "ak_a_iii": 0, "ak_a_iv": 0, "ak_a_v": 0,
                "ak_b_i": 0, "ak_b_ii": 0, "ak_b_iii": 0, "ak_b_iv": 0, "ak_c": 0, "ak_d": 0,
                "pa_a_i": 0, "pa_a_ii": 0, "pa_a_iii": 0, "pa_a_iv": 0, "pa_a_v": 0, "pa_a_vi": 0, "pa_a_vii": 0,
                "pa_b_i": 0, "pa_b_ii": 0, "pa_b_iii": 0, "pa_b_iv": 0
            }

            # KROK 1: Dodanie wpisów ręcznych
            for item in manual_store:
                sums[item["cat"]] += item["amount"]

            # KROK 2: Dodanie zamkniętych sald z kont T-owych
            for code, data in t_accounts_store.items():
                acc_info = CHART_OF_ACCOUNTS[code]
                sum_wn = sum([x['amt'] for x in data['wn']])
                sum_ma = sum([x['amt'] for x in data['ma']])

                if acc_info['type'] == 'A':
                    saldo = sum_wn - sum_ma
                    if saldo > 0: sums[acc_info['target']] += saldo
                
                elif acc_info['type'] == 'P':
                    saldo = sum_ma - sum_wn
                    if saldo > 0: sums[acc_info['target']] += saldo
                
                elif acc_info['type'] == 'A_contra': # np. Umorzenie (zmniejsza aktywa)
                    saldo = sum_ma - sum_wn
                    if saldo > 0: sums[acc_info['target']] -= saldo # ODEJMUJEMY!
                
                elif acc_info['type'] == 'AP': # Rozrachunki
                    if sum_wn > sum_ma:
                        # Saldo Dt -> Aktywa (Należności)
                        sums[acc_info['target_A']] += (sum_wn - sum_ma)
                    elif sum_ma > sum_wn:
                        # Saldo Ct -> Pasywa (Zobowiązania)
                        sums[acc_info['target_P']] += (sum_ma - sum_wn)

            # Obliczenia podsumowań Głównych
            aktywa_a = sums["ak_a_i"] + sums["ak_a_ii"] + sums["ak_a_iii"] + sums["ak_a_iv"] + sums["ak_a_v"]
            aktywa_b = sums["ak_b_i"] + sums["ak_b_ii"] + sums["ak_b_iii"] + sums["ak_b_iv"]
            razem_aktywa = aktywa_a + aktywa_b + sums["ak_c"] + sums["ak_d"]

            pasywa_a = sums["pa_a_i"] + sums["pa_a_ii"] + sums["pa_a_iii"] + sums["pa_a_iv"] + sums["pa_a_v"] + sums["pa_a_vi"] + sums["pa_a_vii"]
            pasywa_b = sums["pa_b_i"] + sums["pa_b_ii"] + sums["pa_b_iii"] + sums["pa_b_iv"]
            razem_pasywa = pasywa_a + pasywa_b

            # Generowanie struktury tabeli HTML (wzór zachowany)
            html = f"""
            <table>
                <tr><th colspan="2">AKTYWA</th><th colspan="2">PASYWA</th></tr>
                <tr><th>Pozycja</th><th>Wartość</th><th>Pozycja</th><th>Wartość</th></tr>

                <tr><td class='section-header'>A. Aktywa trwałe</td><td class='section-header'>{aktywa_a:.2f}</td><td class='section-header'>A. Kapitał (fundusz) własny</td><td class='section-header'>{pasywa_a:.2f}</td></tr>
                <tr><td>I. Wartości niematerialne i prawne</td><td>{sums['ak_a_i']:.2f}</td><td>I. Kapitał (fundusz) podstawowy</td><td>{sums['pa_a_i']:.2f}</td></tr>
                <tr><td>II. Rzeczowe aktywa trwałe</td><td>{sums['ak_a_ii']:.2f}</td><td>II. Kapitał (fundusz) zapasowy</td><td>{sums['pa_a_ii']:.2f}</td></tr>
                <tr><td>III. Należności długoterminowe</td><td>{sums['ak_a_iii']:.2f}</td><td>III. Kapitał (fundusz) z aktualizacji wyceny</td><td>{sums['pa_a_iii']:.2f}</td></tr>
                <tr><td>IV. Inwestycje długoterminowe</td><td>{sums['ak_a_iv']:.2f}</td><td>IV. Pozostałe kapitały (fundusze) rezerwowe</td><td>{sums['pa_a_iv']:.2f}</td></tr>
                <tr><td>V. Długoterminowe rozliczenia międzyokresowe</td><td>{sums['ak_a_v']:.2f}</td><td>V. Zysk (strata) z lat ubiegłych</td><td>{sums['pa_a_v']:.2f}</td></tr>

                <tr><td class='section-header'>B. Aktywa obrotowe</td><td class='section-header'>{aktywa_b:.2f}</td><td>VI. Zysk (strata) netto</td><td>{sums['pa_a_vi']:.2f}</td></tr>
                <tr><td>I. Zapasy</td><td>{sums['ak_b_i']:.2f}</td><td>VII. Odpisy z zysku netto...</td><td>{sums['pa_a_vii']:.2f}</td></tr>
                <tr><td>II. Należności krótkoterminowe</td><td>{sums['ak_b_ii']:.2f}</td><td class='section-header'>B. Zobowiązania i rezerwy na zobowiązania</td><td class='section-header'>{pasywa_b:.2f}</td></tr>
                <tr><td>III. Inwestycje krótkoterminowe</td><td>{sums['ak_b_iii']:.2f}</td><td>I. Rezerwy na zobowiązania</td><td>{sums['pa_b_i']:.2f}</td></tr>
                <tr><td>IV. Krótkoterminowe rozliczenia międzyokresowe</td><td>{sums['ak_b_iv']:.2f}</td><td>II. Zobowiązania długoterminowe</td><td>{sums['pa_b_ii']:.2f}</td></tr>

                <tr><td class='section-header'>C. Należne wpłaty na kapitał (fundusz) podstawowy</td><td class='section-header'>{sums['ak_c']:.2f}</td><td>III. Zobowiązania krótkoterminowe</td><td>{sums['pa_b_iii']:.2f}</td></tr>
                <tr><td class='section-header'>D. Udziały (akcje) własne</td><td class='section-header'>{sums['ak_d']:.2f}</td><td>IV. Rozliczenia międzyokresowe</td><td>{sums['pa_b_iv']:.2f}</td></tr>

                <tr><td class='main-total'>RAZEM AKTYWA</td><td class='main-total'>{razem_aktywa:.2f}</td><td class='main-total'>RAZEM PASYWA</td><td class='main-total'>{razem_pasywa:.2f}</td></tr>
            </table>
            """
            js.document.getElementById("bilans-output").innerHTML = html
            
            # Weryfikacja bilansowa
            if abs(razem_aktywa - razem_pasywa) > 0.01:
                js.alert(f"UWAGA! Bilans się nie bilansuje. Różnica wynosi: {abs(razem_aktywa - razem_pasywa):.2f} PLN. Sprawdź księgowania i regułę podwójnego zapisu!")
            else:
                js.alert("Sukces! Aktywa równają się pasywom.")

    </script>
</body>
</html>
