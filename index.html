        .action-btn:hover { background-color: #219653; }
        .action-btn-purple { background-color: #8e44ad; font-size: 1.1em; width: 100%; margin-top: 10px; padding: 12px; }

        .close-btn { background-color: #f39c12; width: 100%; margin-top: 15px; }

        .t-side { width: 50%; padding: 5px; box-sizing: border-box; display: flex; flex-direction: column;}
        .t-wn { border-right: 3px solid #2c3e50; }
        .t-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; margin-bottom: 4px; padding-bottom: 2px;}
        .op-actions { display: flex; gap: 3px; }
        .op-btn { background: none; border: none; cursor: pointer; padding: 0 3px; font-size: 1em; color: #7f8c8d; }
        .op-btn:hover { color: #e74c3c; transform: scale(1.1); }
        
        .t-input-row { display: flex; flex-direction: column; gap: 5px; margin-top: auto; padding-top: 10px;}
        .t-input-row input { width: 100%; box-sizing: border-box; padding: 4px; font-size: 0.85em; }

        def init_select():
            sel = js.document.getElementById("t_account_select")
            html = ""
            current_group = ""
            for code, data in CHART_OF_ACCOUNTS.items():
                group_prefix = code[0]
                group_name = GROUP_NAMES.get(group_prefix, f"Zespół {group_prefix}")
                if group_name != current_group:
                    if current_group != "": html += "</optgroup>"
                    html += f"<optgroup label='{group_name}'>"
                    current_group = group_name
                html += f"<option value='{code}'>{code} {data[0]}</option>"
            if current_group != "": html += "</optgroup>"
            sel.innerHTML = html

        init_select()

        def fmt_pln(val):
            if val == 0: return "0"
            s = f"{val:,.2f}"
            return s.replace(",", "X").replace(".", ",").replace("X", " ")

        def parse_pln(val_str):
            if not val_str: return 0.0
            val_str = str(val_str).replace(" ", "").replace(",", ".")
            return float(val_str)

            item = manual_store[index]
            js.document.getElementById("item_number").value = item.get('no', '')
            js.document.getElementById("amount").value = fmt_pln(item['amount'])
            js.document.getElementById("category").value = item['cat']
            manual_store.pop(index)
            render_manual_list()

        js.window.delete_manual_py = delete_manual
        js.window.edit_manual_py = edit_manual

        def render_manual_list():
            ul = js.document.getElementById("items-list")
            ul.innerHTML = ""
            for i, item in enumerate(manual_store):
                li = js.document.createElement("li")
                li.style.borderBottom = "1px solid #ddd"
                li.style.padding = "5px 0"
                cat_name = js.document.getElementById("category").querySelector(f"option[value='{item['cat']}']").innerText
                
                no_str = f"<strong>{item.get('no', '')})</strong> " if item.get('no') else ""
                li.innerHTML = f"{no_str}<strong>{fmt_pln(item['amount'])}</strong> -> {cat_name} "
                
                btn_del = js.document.createElement("button")
                btn_del.className = "delete-btn"
                btn_del.innerText = "Usuń"
                btn_del.setAttribute("onclick", f"window.delete_manual_py({i})")
                
                btn_edit = js.document.createElement("button")
                btn_edit.className = "edit-btn"
                btn_edit.innerText = "Edytuj ✎"
                btn_edit.setAttribute("onclick", f"window.edit_manual_py({i})")
                
                li.appendChild(btn_del)
                li.appendChild(btn_edit)
                ul.appendChild(li)

        def add_manual_item(e):
            item_no = js.document.getElementById("item_number").value
            amt_str = js.document.getElementById("amount").value
            cat = js.document.getElementById("category").value
            if not amt_str: return
            try:
                amt = parse_pln(amt_str)
                manual_store.append({"no": item_no, "cat": cat, "amount": amt})
                render_manual_list()
                js.document.getElementById("item_number").value = ""
                js.document.getElementById("amount").value = ""
            except:
                js.alert("Niepoprawny format kwoty!")

        # --- FUNKCJE KONT T-OWYCH ---
        def add_t_account(e):
            code = js.document.getElementById("t_account_select").value
            if code not in t_accounts_store:
                t_accounts_store[code] = {"wn": [], "ma": []}
                # Po dodaniu nowego konta nie wymuszamy otwierania wszystkich jeśli były zamknięte, 
                # ale dla zachowania logiki można zresetować flagę zamknięcia, by użytkownik mógł je uzupełnić.
                global accounts_closed
                accounts_closed = False
                update_toggle_btn()
                render_t_accounts()
            else:
                js.alert("To konto jest już otwarte na planszy!")

        def add_operation(code, side):
            if accounts_closed:
                js.alert("Konta są zamknięte! Otwórz je przyciskiem, aby edytować.")
                return
            op_input = js.document.getElementById(f"op_{side}_{code}").value
            amt_input = js.document.getElementById(f"amt_{side}_{code}").value
            if not amt_input: return
            try:
                amt = parse_pln(amt_input)
                op = op_input if op_input else "Sp"
                t_accounts_store[code][side].append({"op": op, "amt": amt})
                render_t_accounts()
            except:
                js.alert("Niepoprawna kwota w operacji.")

        def edit_operation(code, side, idx):
            op_data = t_accounts_store[code][side][idx]
            new_amt_str = js.prompt("Wpisz nową kwotę (np. 1 500,50):", fmt_pln(op_data['amt']))
            if new_amt_str is None: return
            new_op_str = js.prompt("Wpisz nowy numer operacji:", op_data['op'])
            if new_op_str is None: return
            
            try:
                amt = parse_pln(new_amt_str)
                t_accounts_store[code][side][idx] = {"op": new_op_str, "amt": amt}
                global accounts_closed
                accounts_closed = False
                update_toggle_btn()
                render_t_accounts()
            except ValueError:
                js.alert("Niepoprawny format kwoty!")

        def delete_operation(code, side, idx):
            if js.confirm("Czy usunąć tę pozycję z konta?"):
                t_accounts_store[code][side].pop(idx)
                global accounts_closed
                accounts_closed = False
                update_toggle_btn()
                render_t_accounts()

        js.window.add_op_py = add_operation
        js.window.edit_op_py = edit_operation
        js.window.del_op_py = delete_operation

        def update_toggle_btn():
            btn = js.document.getElementById("toggle-btn")
            if accounts_closed:
                btn.innerText = "OTWÓRZ KONTA (Powrót do edycji)"
                btn.style.backgroundColor = "#e67e22"
            else:
                btn.innerText = "ZAMKNIJ KONTA (Pociągnij salda i wygeneruj podsumowania)"
                btn.style.backgroundColor = "#f39c12"

        def render_t_accounts():
            container = js.document.getElementById("t-accounts-container")
            html = ""
            for code, data in t_accounts_store.items():
                acc_info = CHART_OF_ACCOUNTS[code]
                
                wn_html = ""
                for idx, x in enumerate(data['wn']):
                    wn_html += f"<div class='t-row'><span>{x['op']})</span> <span>{fmt_pln(x['amt'])} <span class='op-actions'><button class='op-btn' onclick=\"window.edit_op_py('{code}', 'wn', {idx})\">✎</button><button class='op-btn' onclick=\"window.del_op_py('{code}', 'wn', {idx})\">❌</button></span></span></div>"
                
                ma_html = ""
                for idx, x in enumerate(data['ma']):
                    ma_html += f"<div class='t-row'><span><span class='op-actions'><button class='op-btn' onclick=\"window.del_op_py('{code}', 'ma', {idx})\">❌</button><button class='op-btn' onclick=\"window.edit_op_py('{code}', 'ma', {idx})\">✎</button></span> {fmt_pln(x['amt'])}</span> <span>({x['op']}</span></div>"
                
                sum_wn = round(sum([x['amt'] for x in data['wn']]), 2)
                sum_ma = round(sum([x['amt'] for x in data['ma']]), 2)
                
                footer_html = ""
                if accounts_closed:
                    sk_wn_text = ""
                    sk_ma_text = ""
                    max_sum = max(sum_wn, sum_ma)
                    
                    # Konta przychodowe (R) i kosztowe (E) nie mają salda końcowego (Sk)
                    if acc_info[1] not in ['R', 'E']:
                        diff = round(sum_wn - sum_ma, 2)
                        if diff > 0:
                            sk_ma_text = f"{fmt_pln(diff)} (Sk"
                        elif diff < 0:
                            sk_wn_text = f"Sk) {fmt_pln(abs(diff))}"
                    
                    footer_html = f"""
                    <div class="t-footer">
                        <div class="t-closure-obroty">
                            <div class="col-half border-mid" style="text-align: center;">{fmt_pln(sum_wn)}</div>
                            <div class="col-half" style="text-align: center;">{fmt_pln(sum_ma)}</div>
                        </div>
                        <div class="t-closure-sk">
                            <div class="col-half border-mid" style="text-align: right;">{sk_wn_text}</div>
                            <div class="col-half" style="text-align: left;">{sk_ma_text}</div>
                        </div>
                        <div class="t-closure-final">
                            <div class="col-half border-mid" style="text-align: center;">{fmt_pln(max_sum)}</div>
                            <div class="col-half" style="text-align: center;">{fmt_pln(max_sum)}</div>
                        </div>
                    </div>
                    """
                else:
                    footer_html = f"""
                    <div class="t-input-row">
                        <div style="display:flex; justify-content: space-between; gap:5px;">
                            <div style="width:50%; display:flex; flex-direction:column; gap:2px;">
                                <input type="text" id="op_wn_{code}" placeholder="Nr (np. Sp)">
                                <input type="text" id="amt_wn_{code}" placeholder="Kwota Dt">
                                <button onclick="window.add_op_py('{code}', 'wn')" style="padding:4px;">Księguj Dt</button>
                            </div>
                            <div style="width:50%; display:flex; flex-direction:column; gap:2px;">
                                <input type="text" id="op_ma_{code}" placeholder="Nr (np. 1)">
                                <input type="text" id="amt_ma_{code}" placeholder="Kwota Ct">
                                <button onclick="window.add_op_py('{code}', 'ma')" style="padding:4px;">Księguj Ct</button>
                            </div>
                        </div>
                    </div>
                    """

                acc_html = f"""
                <div class="t-account">
                    <div class="t-header">{code} {acc_info[0]}</div>
                    <div class="t-body">
                        <div class="t-side t-wn">
                            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">Dt (Wn)</div>
                            {wn_html}
                        </div>
                        <div class="t-side">
                            <div style="text-align:center; font-weight:bold; margin-bottom:5px;">Ct (Ma)</div>
                            {ma_html}
                        </div>
                    </div>
                    {footer_html}
                </div>
                """
                html += acc_html
            container.innerHTML = html

        def toggle_t_accounts(e):
            global accounts_closed
            accounts_closed = not accounts_closed
            update_toggle_btn()
            render_t_accounts()

        # --- GENEROWANIE NAGŁÓWKA SPRAWOZDANIA ---
        def get_report_header(title):
            entity = js.document.getElementById("entity_name").value or "........................................"
            date = js.document.getElementById("report_date").value or "....................."
            return f"""
            <div class='report-header'>
                <h3>{title}</h3>
                <h4>Nazwa jednostki: <strong>{entity}</strong></h4>
                <h4>Sporządzone na dzień: <strong>{date}</strong></h4>
            </div>
            """

        # --- ZESTAWIENIE OBROTÓW I SALD ---
        def generate_trial_balance(e):
            html = get_report_header("Zestawienie obrotów i sald kont księgi głównej")
            html += """
            <table>
                <tr>
                    <th rowspan="2">Nazwa konta</th>
                    <th colspan="2">Salda na dzień otwarcia ksiąg rachunkowych</th>
                    <th colspan="2">Obroty za okres sprawozdawczy</th>
                    <th colspan="2">Obroty narastająco od początku roku (z saldem)</th>
                    <th colspan="2">Salda na koniec okresu sprawozdawczego</th>
                </tr>
                <tr>
                    <th>Dt</th><th>Ct</th>
                    <th>Dt</th><th>Ct</th>
                    <th>Dt</th><th>Ct</th>
                    <th>Dt</th><th>Ct</th>
                </tr>
            """
            
            tot_bo_dt = tot_bo_ct = tot_ob_dt = tot_ob_ct = tot_nar_dt = tot_nar_ct = tot_sk_dt = tot_sk_ct = 0

            # Sortujemy po numerze konta
            for code in sorted(t_accounts_store.keys()):
                data = t_accounts_store[code]
                name = f"{code} {CHART_OF_ACCOUNTS[code][0]}"
                
                # BO to wpisy z numerem operacji "Sp" lub "BO" (bez względu na wielkość liter)
                bo_dt = round(sum(x['amt'] for x in data['wn'] if x['op'].strip().lower() in ['sp', 'bo']), 2)
                bo_ct = round(sum(x['amt'] for x in data['ma'] if x['op'].strip().lower() in ['sp', 'bo']), 2)
                
                # Reszta to obroty bieżące
                ob_dt = round(sum(x['amt'] for x in data['wn'] if x['op'].strip().lower() not in ['sp', 'bo']), 2)
                ob_ct = round(sum(x['amt'] for x in data['ma'] if x['op'].strip().lower() not in ['sp', 'bo']), 2)
                
                nar_dt = round(bo_dt + ob_dt, 2)
                nar_ct = round(bo_ct + ob_ct, 2)
                
                sk_dt = max(0, nar_dt - nar_ct)
                sk_ct = max(0, nar_ct - nar_dt)
                
                # Sumy końcowe do podsumowania
                tot_bo_dt += bo_dt; tot_bo_ct += bo_ct
                tot_ob_dt += ob_dt; tot_ob_ct += ob_ct
                tot_nar_dt += nar_dt; tot_nar_ct += nar_ct
                tot_sk_dt += sk_dt; tot_sk_ct += sk_ct
                
                html += f"""
                <tr>
                    <td>{name}</td>
                    <td class='val'>{fmt_pln(bo_dt)}</td><td class='val'>{fmt_pln(bo_ct)}</td>
                    <td class='val'>{fmt_pln(ob_dt)}</td><td class='val'>{fmt_pln(ob_ct)}</td>
                    <td class='val'>{fmt_pln(nar_dt)}</td><td class='val'>{fmt_pln(nar_ct)}</td>
                    <td class='val'>{fmt_pln(sk_dt)}</td><td class='val'>{fmt_pln(sk_ct)}</td>
                </tr>
                """
            
            # Wiersz podsumowania SUMA
            html += f"""
                <tr style='font-weight: bold; background-color: #ecf0f1;'>
                    <td>SUMA</td>
                    <td class='val'>{fmt_pln(tot_bo_dt)}</td><td class='val'>{fmt_pln(tot_bo_ct)}</td>
                    <td class='val'>{fmt_pln(tot_ob_dt)}</td><td class='val'>{fmt_pln(tot_ob_ct)}</td>
                    <td class='val'>{fmt_pln(tot_nar_dt)}</td><td class='val'>{fmt_pln(tot_nar_ct)}</td>
                    <td class='val'>{fmt_pln(tot_sk_dt)}</td><td class='val'>{fmt_pln(tot_sk_ct)}</td>
                </tr>
            </table>
            """
            js.document.getElementById("zestawienie-output").innerHTML = html
            js.document.getElementById("bilans-output").innerHTML = "" 
            
            # Sprawdzenie poprawności księgowań (zasada podwójnego zapisu)
            if abs(tot_ob_dt - tot_ob_ct) > 0.01:
                js.alert("UWAGA! Obroty za okres Dt i Ct nie są sobie równe. Sprawdź poprawność księgowań!")

        # --- GENEROWANIE BILANSU ---
        def generate_balance(e):
            if t_accounts_store and not accounts_closed:
                js.alert("Masz otwarte konta T-owe! Najpierw zamknij konta żółtym przyciskiem.")
                return

            sums = {
                "ak_a_i": 0, "ak_a_ii": 0, "ak_a_iii": 0, "ak_a_iv": 0, "ak_a_v": 0,
                "ak_b_i": 0, "ak_b_ii": 0, "ak_b_iii": 0, "ak_b_iv": 0, "ak_c": 0, "ak_d": 0,
                "pa_a_i": 0, "pa_a_ii": 0, "pa_a_iii": 0, "pa_a_iv": 0, "pa_a_v": 0, "pa_a_vi": 0, "pa_a_vii": 0,
                "pa_b_i": 0, "pa_b_ii": 0, "pa_b_iii": 0, "pa_b_iv": 0
            }

            net_profit_from_operations = 0

            for item in manual_store:
                sums[item["cat"]] += item["amount"]

            for code, data in t_accounts_store.items():
                acc_info = CHART_OF_ACCOUNTS[code]
                sum_wn = sum([x['amt'] for x in data['wn']])
                sum_ma = sum([x['amt'] for x in data['ma']])
                acc_type = acc_info[1]

                if acc_type == 'A':
                    saldo = sum_wn - sum_ma
                    if saldo > 0: sums[acc_info[2]] += saldo
                
                elif acc_type == 'P':
                    saldo = sum_ma - sum_wn
                    if saldo > 0: sums[acc_info[2]] += saldo
                
                elif acc_type == 'A_contra':
                    saldo = sum_ma - sum_wn
                    if saldo > 0: sums[acc_info[2]] -= saldo
                
                elif acc_type == 'AP':
                    if sum_wn > sum_ma:
                        sums[acc_info[2]] += (sum_wn - sum_ma)
                    elif sum_ma > sum_wn:
                        sums[acc_info[3]] += (sum_ma - sum_wn)
                        
                elif acc_type == 'R': 
                    saldo = sum_ma - sum_wn
                    net_profit_from_operations += saldo
                    
                elif acc_type == 'E': 
                    saldo = sum_wn - sum_ma
                    net_profit_from_operations -= saldo

            sums["pa_a_vi"] += net_profit_from_operations

            aktywa_a = sums["ak_a_i"] + sums["ak_a_ii"] + sums["ak_a_iii"] + sums["ak_a_iv"] + sums["ak_a_v"]
            aktywa_b = sums["ak_b_i"] + sums["ak_b_ii"] + sums["ak_b_iii"] + sums["ak_b_iv"]
            razem_aktywa = aktywa_a + aktywa_b + sums["ak_c"] + sums["ak_d"]

            pasywa_a = sums["pa_a_i"] + sums["pa_a_ii"] + sums["pa_a_iii"] + sums["pa_a_iv"] + sums["pa_a_v"] + sums["pa_a_vi"] + sums["pa_a_vii"]
            pasywa_b = sums["pa_b_i"] + sums["pa_b_ii"] + sums["pa_b_iii"] + sums["pa_b_iv"]
            razem_pasywa = pasywa_a + pasywa_b

            html = get_report_header("Bilans")
            html += f"""
            <table>
                <tr><th colspan="2">AKTYWA</th><th colspan="2">PASYWA</th></tr>
                <tr><th>Pozycja</th><th>Wartość</th><th>Pozycja</th><th>Wartość</th></tr>

                <tr><td class='section-header'>A. Aktywa trwałe</td><td class='section-header val'>{fmt_pln(aktywa_a)}</td><td class='section-header'>A. Kapitał (fundusz) własny</td><td class='section-header val'>{fmt_pln(pasywa_a)}</td></tr>
                <tr><td>I. Wartości niematerialne i prawne</td><td class='val'>{fmt_pln(sums['ak_a_i'])}</td><td>I. Kapitał (fundusz) podstawowy</td><td class='val'>{fmt_pln(sums['pa_a_i'])}</td></tr>
                <tr><td>II. Rzeczowe aktywa trwałe</td><td class='val'>{fmt_pln(sums['ak_a_ii'])}</td><td>II. Kapitał (fundusz) zapasowy</td><td class='val'>{fmt_pln(sums['pa_a_ii'])}</td></tr>
                <tr><td>III. Należności długoterminowe</td><td class='val'>{fmt_pln(sums['ak_a_iii'])}</td><td>III. Kapitał (fundusz) z aktualizacji wyceny</td><td class='val'>{fmt_pln(sums['pa_a_iii'])}</td></tr>
                <tr><td>IV. Inwestycje długoterminowe</td><td class='val'>{fmt_pln(sums['ak_a_iv'])}</td><td>IV. Pozostałe kapitały (fundusze) rezerwowe</td><td class='val'>{fmt_pln(sums['pa_a_iv'])}</td></tr>
                <tr><td>V. Długoterm. rozliczenia międzyokresowe</td><td class='val'>{fmt_pln(sums['ak_a_v'])}</td><td>V. Zysk (strata) z lat ubiegłych</td><td class='val'>{fmt_pln(sums['pa_a_v'])}</td></tr>

                <tr><td class='section-header'>B. Aktywa obrotowe</td><td class='section-header val'>{fmt_pln(aktywa_b)}</td><td>VI. Zysk (strata) netto</td><td class='val'><strong>{fmt_pln(sums['pa_a_vi'])}</strong></td></tr>
                <tr><td>I. Zapasy</td><td class='val'>{fmt_pln(sums['ak_b_i'])}</td><td>VII. Odpisy z zysku netto...</td><td class='val'>{fmt_pln(sums['pa_a_vii'])}</td></tr>
                <tr><td>II. Należności krótkoterminowe</td><td class='val'>{fmt_pln(sums['ak_b_ii'])}</td><td class='section-header'>B. Zobowiązania i rezerwy na zobowiązania</td><td class='section-header val'>{fmt_pln(pasywa_b)}</td></tr>
                <tr><td>III. Inwestycje krótkoterminowe</td><td class='val'>{fmt_pln(sums['ak_b_iii'])}</td><td>I. Rezerwy na zobowiązania</td><td class='val'>{fmt_pln(sums['pa_b_i'])}</td></tr>
                <tr><td>IV. Krótkoterm. rozliczenia międzyokresowe</td><td class='val'>{fmt_pln(sums['ak_b_iv'])}</td><td>II. Zobowiązania długoterminowe</td><td class='val'>{fmt_pln(sums['pa_b_ii'])}</td></tr>

                <tr><td class='section-header'>C. Należne wpłaty na kapitał (fundusz) podst.</td><td class='section-header val'>{fmt_pln(sums['ak_c'])}</td><td>III. Zobowiązania krótkoterminowe</td><td class='val'>{fmt_pln(sums['pa_b_iii'])}</td></tr>
                <tr><td class='section-header'>D. Udziały (akcje) własne</td><td class='section-header val'>{fmt_pln(sums['ak_d'])}</td><td>IV. Rozliczenia międzyokresowe</td><td class='val'>{fmt_pln(sums['pa_b_iv'])}</td></tr>

                <tr><td class='main-total'>RAZEM AKTYWA</td><td class='main-total val'>{fmt_pln(razem_aktywa)}</td><td class='main-total'>RAZEM PASYWA</td><td class='main-total val'>{fmt_pln(razem_pasywa)}</td></tr>
            </table>
            """
            js.document.getElementById("bilans-output").innerHTML = html
            js.document.getElementById("zestawienie-output").innerHTML = ""
            
            diff = abs(razem_aktywa - razem_pasywa)
            if diff > 0.01:
                js.alert(f"UWAGA! Bilans się nie zgadza. Różnica wynosi: {fmt_pln(diff)} PLN.\nSprawdź Zestawienie Obrotów i Sald, by znaleźć błąd!")

    </script>
</body>
</html>
